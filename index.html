<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Precision Laser Solutions</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='17 188 197 232'%3E%3Crect x='17' y='188' width='197' height='232' fill='%23000000'/%3E%3Ccircle cx='114.534' cy='320.711' r='18.773' fill='%235BC8E8'/%3E%3Cpolygon points='188.481 394.659 40.586 394.659 40.586 246.764 155.574 246.764 175.345 223.641 17.464 223.641 17.464 417.782 211.604 417.782 211.604 252.49 188.481 273.979 188.481 394.659' fill='%23ffffff'/%3E%3Cpath d='M131.018,296.419c2.554,1.738,4.801,3.883,6.693,6.318l80.417-74.727v-33.769l-87.111,102.178Z' fill='%235BC8E8'/%3E%3Cpath d='M90.506,337.55l-49.92,49.919v7.19h6.434l50.244-50.243c-2.61-1.907-4.898-4.221-6.758-6.866Z' fill='%235BC8E8'/%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ============================================================
   PRECISION LASER SOLUTIONS — GLOBAL STYLES
   Black #000000 | Bluefish #5BC8E8 | White #FFFFFF | Pantone 428C #C8CDD0
   ============================================================ */
:root{
  --navy:#000000;--navy2:#111111;--orange:#5BC8E8;--orange2:#3db5d6;
  --white:#fff;--offwhite:#F5F6F8;--gray:#E2E5EC;--muted:#555555;
  --text:#000000;--radius:6px;
  --shadow:0 4px 24px rgba(0,0,0,.10);
  --shadow-lg:0 10px 44px rgba(0,0,0,.18);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Barlow',sans-serif;font-size:16px;color:var(--text);background:var(--white);line-height:1.65;min-height:100vh}
h1,h2,h3,h4{font-family:'Barlow Condensed',sans-serif;font-weight:700;color:var(--navy);line-height:1.15;letter-spacing:.02em}
h1{font-size:clamp(2rem,5vw,3.4rem)}
h2{font-size:clamp(1.6rem,3.5vw,2.4rem)}
h3{font-size:clamp(1.1rem,2vw,1.5rem)}
p{margin-bottom:1rem;color:var(--text)}
a{color:#000000;text-decoration:none;cursor:pointer}
a:hover{color:#333333}
img{max-width:100%;display:block}

/* ---- LAYOUT ---- */
.container{max-width:1160px;margin:0 auto;padding:0 24px}
.section{padding:76px 0}
.section-alt{background:var(--offwhite)}
.section-dark{background:var(--navy)}
.section-dark h2,.section-dark h3,.section-dark p,.section-dark .muted{color:rgba(255,255,255,.85)}
.sec-head{text-align:center;margin-bottom:52px}
.sec-head h2{margin-bottom:10px}
.sec-head p{font-size:1.05rem;color:var(--muted);max-width:580px;margin:0 auto}
.sec-head .line{width:52px;height:4px;background:var(--orange);margin:14px auto 0;border-radius:2px}

/* ---- NAV ---- */
.site-nav{position:sticky;top:0;z-index:1000;background:var(--navy);box-shadow:0 2px 20px rgba(0,0,0,.28)}
.nav-inner{display:flex;align-items:center;justify-content:space-between;height:100px;max-width:1160px;margin:0 auto;padding:0 24px}
.nav-logo-link{cursor:pointer;display:flex;align-items:center;flex-shrink:0;padding:10px 0}
.nav-logo-link svg{height:60px;width:auto;display:block;overflow:visible}
.nav-links{display:flex;gap:4px;list-style:none;align-items:center}
.nav-links a{
  font-family:'Barlow Condensed',sans-serif;font-size:.92rem;font-weight:700;
  letter-spacing:.09em;text-transform:uppercase;color:rgba(255,255,255,.82);
  padding:7px 13px;border-radius:var(--radius);transition:background .18s,color .18s;cursor:pointer
}
.nav-links a:hover{background:rgba(91,200,232,.18);color:var(--orange)}
.nav-links a.active{background:var(--orange);color:#000000!important}

.hamburger{display:none;background:none;border:none;cursor:pointer;padding:6px;flex-direction:column;gap:5px}
.hamburger span{display:block;width:23px;height:2.5px;background:#fff;border-radius:2px;transition:all .3s}
.hamburger.open span:nth-child(1){transform:translateY(7.5px) rotate(45deg)}
.hamburger.open span:nth-child(2){opacity:0}
.hamburger.open span:nth-child(3){transform:translateY(-7.5px) rotate(-45deg)}

/* ---- BUTTONS ---- */
.btn{
  display:inline-block;font-family:'Barlow Condensed',sans-serif;
  font-weight:700;font-size:1rem;letter-spacing:.06em;text-transform:uppercase;
  padding:13px 30px;border-radius:var(--radius);cursor:pointer;
  transition:all .2s;border:2px solid transparent
}
.btn-primary{background:var(--orange);color:#000000;border-color:var(--orange)}
.btn-primary:hover{background:var(--orange2);border-color:var(--orange2);color:#000000;transform:translateY(-2px);box-shadow:0 6px 20px rgba(91,200,232,.35)}
.btn-outline{background:transparent;border-color:rgba(255,255,255,.7);color:#fff}
.btn-outline:hover{background:#fff;color:var(--navy);border-color:#fff}
.btn-outline-dark{background:transparent;border-color:var(--navy);color:var(--navy)}
.btn-outline-dark:hover{background:var(--navy);color:#fff}
.btn-sm{padding:9px 20px;font-size:.88rem}

/* ---- ORANGE ACCENT ---- */
.orange-bar{height:5px;background:var(--orange)}
.badge{display:inline-block;background:var(--orange);color:#000000;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.78rem;letter-spacing:.08em;text-transform:uppercase;padding:4px 12px;border-radius:3px}

/* ---- TAGLINE STRIP ---- */
.tagline-strip{background:var(--orange);padding:18px 0;margin:0 -0px}
.tagline-row{display:flex;align-items:center;justify-content:center;gap:48px}
.tagline-word{font-family:'Barlow Condensed',sans-serif;font-size:2.6rem;font-weight:800;letter-spacing:.18em;text-transform:uppercase;color:#000000;line-height:1}
.tagline-dot{width:7px;height:7px;border-radius:50%;background:rgba(0,0,0,.4)}

/* ---- STATS BAR ---- */
.stats-bar{background:var(--navy2);padding:32px 0}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;text-align:center}
.stat-num{font-family:'Barlow Condensed',sans-serif;font-size:2.6rem;font-weight:800;color:var(--orange);display:block}
.stat-label{font-size:.82rem;font-weight:600;color:rgba(255,255,255,.65);text-transform:uppercase;letter-spacing:.08em}

/* ---- HERO ---- */
.hero{background:#ffffff;padding:90px 0 76px;position:relative;overflow:hidden;min-height:calc(100vh - 100px)}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 70% 50%,rgba(0,0,0,.04) 0%,transparent 60%);pointer-events:none}
.hero-grid{display:grid;grid-template-columns:1fr 1fr;align-items:center;gap:56px}
.hero-text h1{color:var(--navy);margin-bottom:18px}
.hero-text h1 span{color:#000000}
.hero-text p{color:var(--muted);font-size:1.1rem;margin-bottom:28px}
.hero-btns{display:flex;gap:12px;flex-wrap:wrap}
.hero-photo-area{
  border-radius:10px;overflow:hidden;
  border:2px dashed rgba(0,0,0,.25);
  min-height:calc(100vh - 340px);display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:var(--offwhite);
  color:var(--muted);text-align:center;
  font-family:'Barlow Condensed',sans-serif;font-size:.9rem;letter-spacing:.06em;
  transition:border-color .2s
}
.hero-photo-area:hover{border-color:var(--orange)}
.hero-photo-area svg{width:48px;height:48px;opacity:.3;margin-bottom:10px}

/* ---- PAGE HERO (inner pages) ---- */
.page-hero{background:var(--navy);padding:52px 0 44px;text-align:center}
.page-hero h1{color:#fff}
.page-hero p{color:rgba(255,255,255,.6);margin-top:8px;font-size:1.05rem}
.breadcrumb{font-family:'Barlow Condensed',sans-serif;font-size:.82rem;letter-spacing:.09em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:10px;cursor:pointer}
.breadcrumb span{color:var(--orange);cursor:pointer}
.breadcrumb span:hover{text-decoration:underline}

/* ---- CARDS ---- */
.card{background:#fff;border-radius:10px;box-shadow:var(--shadow);overflow:hidden;transition:transform .22s,box-shadow .22s}
.card:hover{transform:translateY(-5px);box-shadow:var(--shadow-lg)}

/* ---- GRID ---- */
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:22px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:26px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:32px}

/* ---- ITEM CARD (industry/project) ---- */
.item-card{
  border-radius:10px;overflow:hidden;box-shadow:var(--shadow);
  cursor:pointer;transition:transform .22s,box-shadow .22s;
  background:#fff;display:block
}
.item-card:hover{transform:translateY(-6px);box-shadow:var(--shadow-lg)}
.item-card-img{
  height:154px;overflow:hidden;position:relative;
  background:var(--gray);display:flex;align-items:center;justify-content:center
}
.item-card-img .ph{
  width:100%;height:100%;display:flex;flex-direction:column;align-items:center;
  justify-content:center;color:var(--muted);font-family:'Barlow Condensed',sans-serif;
  font-size:.8rem;letter-spacing:.05em;gap:8px;
  background:linear-gradient(135deg,#e8eaf0 0%,#d4d8e4 100%)
}
.item-card-img .ph svg{width:32px;height:32px;opacity:.4}
.item-card-img img{width:100%;height:100%;object-fit:cover}
.item-card-body{padding:16px 18px}
.item-card-body h3{font-size:1rem;margin-bottom:5px;color:var(--navy)}
.item-card-body p{font-size:.84rem;color:var(--muted);margin:0}
.item-card-arrow{float:right;color:#000000;font-size:1.1rem;margin-top:-2px}

/* ---- WHY ITEMS ---- */
.why-item{display:flex;gap:18px;align-items:flex-start}
.why-icon{width:50px;height:50px;border-radius:10px;background:rgba(200,205,208,.15);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.why-icon svg{width:26px;height:26px}
.why-item h3{font-size:1.05rem;margin-bottom:6px;color:#fff}
.why-item p{font-size:.88rem;color:rgba(255,255,255,.7);margin:0}

/* ---- TESTIMONIAL ---- */
.testimonial{background:#fff;border-radius:10px;padding:26px 28px;box-shadow:var(--shadow);border-left:5px solid var(--orange);position:relative}
.testimonial .qmark{font-size:4.5rem;line-height:1;color:var(--orange);font-family:Georgia,serif;position:absolute;top:10px;left:20px;opacity:.18}
.testimonial p{font-style:italic;font-size:.96rem;padding-top:12px;margin-bottom:14px}
.testimonial-auth{font-weight:700;color:var(--navy);font-size:.9rem}
.testimonial-co{font-size:.82rem;color:var(--muted)}

/* ---- FORM ---- */
.form-group{margin-bottom:18px}
.form-group label{display:block;font-weight:600;font-size:.85rem;color:var(--navy);margin-bottom:5px;font-family:'Barlow Condensed',sans-serif;letter-spacing:.05em;text-transform:uppercase}
.form-group input,.form-group textarea,.form-group select{width:100%;padding:11px 15px;border:1.5px solid var(--gray);border-radius:var(--radius);font-family:'Barlow',sans-serif;font-size:.95rem;color:var(--text);background:#fff;transition:border-color .2s;outline:none}
.form-group input:focus,.form-group textarea:focus,.form-group select:focus{border-color:var(--orange)}
.form-group textarea{resize:vertical;min-height:120px}
.input-error{border-color:#c0392b!important;background:#fff8f8!important}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}

/* ---- CONTACT BLOCK ---- */
.contact-item{display:flex;align-items:flex-start;gap:16px;padding:18px 0;border-bottom:1px solid var(--gray)}
.contact-item:last-child{border-bottom:none}
.ci-icon{width:44px;height:44px;border-radius:50%;background:#E2E5EC;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0}
.ci-label{font-weight:700;color:var(--navy);font-size:.88rem;margin-bottom:2px}
.ci-val{font-size:1.02rem;color:var(--text)}

/* ---- CLIENT LOGOS ---- */
.client-logo-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:22px}
.client-box{background:#fff;border:1.5px solid var(--gray);border-radius:8px;padding:26px 18px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;min-height:112px;transition:border-color .2s,box-shadow .2s}
.client-box:hover{border-color:var(--orange);box-shadow:var(--shadow)}
.client-box .logo-ph{width:88px;height:36px;background:var(--gray);border-radius:4px;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:.75rem;color:var(--muted);letter-spacing:.04em;margin-bottom:9px}
.client-box span{font-size:.82rem;color:var(--muted)}

/* ---- PHOTO PLACEHOLDER ---- */
.photo-ph{
  background:linear-gradient(135deg,#e8eaf0,#d4d8e4);
  border:2px dashed var(--gray);border-radius:var(--radius);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  color:var(--muted);text-align:center;
  font-family:'Barlow Condensed',sans-serif;font-size:.85rem;letter-spacing:.04em;
  padding:20px;cursor:pointer;transition:border-color .2s,background .2s;
  min-height:220px
}
.photo-ph:hover{border-color:var(--orange);background:rgba(91,200,232,.04)}
.photo-ph svg{width:38px;height:38px;opacity:.35;margin-bottom:10px}

/* ---- SUBPAGE ---- */
.sub-content{max-width:920px;margin:0 auto}
.sub-gallery{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin:28px 0}
.sub-gallery .photo-ph{min-height:180px}

/* ---- BEFORE/AFTER REVEAL SLIDER ---- */
.ba-gallery{display:flex;flex-direction:column;gap:30px;margin:28px 0}
.ba-card{background:#fff;border:1px solid var(--gray);border-radius:10px;overflow:hidden;box-shadow:var(--shadow)}
.ba-head{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:14px 20px;border-bottom:1px solid var(--gray)}
.ba-head .ba-tag{font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:.1em;text-transform:uppercase;font-size:.82rem;color:var(--orange2)}
.ba-head .ba-num{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.82rem;color:var(--muted);letter-spacing:.08em}
.ba{position:relative;width:100%;aspect-ratio:1500/1029;user-select:none;overflow:hidden;cursor:ew-resize;touch-action:none;background:var(--gray)}
.ba img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;pointer-events:none;margin:0;max-width:none}
.ba .ba-after{clip-path:inset(0 0 0 50%)}
.ba .ba-lbl{position:absolute;top:14px;z-index:4;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:.12em;font-size:.74rem;text-transform:uppercase;padding:5px 11px;border-radius:4px}
.ba .ba-lbl.b{left:14px;background:rgba(0,0,0,.72);color:#fff}
.ba .ba-lbl.a{right:14px;background:var(--orange);color:#000}
.ba .ba-div{position:absolute;top:0;bottom:0;width:3px;background:var(--orange);z-index:3;left:50%;transform:translateX(-50%);box-shadow:0 0 12px rgba(91,200,232,.7)}
.ba .ba-handle{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:5;width:44px;height:44px;border-radius:50%;background:var(--orange);display:flex;align-items:center;justify-content:center;box-shadow:0 3px 14px rgba(0,0,0,.4);border:3px solid #fff;pointer-events:none}
.ba .ba-handle svg{width:20px;height:20px;fill:#000}
.ba-foot{padding:18px 20px}
.ba-foot h3{font-size:1.15rem;margin-bottom:6px}
.ba-foot p{font-size:.9rem;color:var(--muted);margin:0}
.ba-specs{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
.ba-chip{font-family:'Barlow Condensed',sans-serif;font-size:.74rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);border:1px solid var(--gray);background:var(--offwhite);padding:5px 10px;border-radius:30px}
.ba-chip b{color:var(--orange2);font-weight:700}
.ba-hint{text-align:center;color:var(--muted);font-size:.82rem;margin-top:2px}
.ba-hint b{color:var(--orange2)}
.ba-soon{position:relative;width:100%;aspect-ratio:1500/1029;border-radius:10px;border:2px dashed var(--gray);background:linear-gradient(135deg,#eef0f4 0%,#dfe3ec 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--muted);text-align:center;padding:20px}
.ba-soon svg{width:42px;height:42px;opacity:.4}
.ba-soon .ba-soon-t{font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:.06em;text-transform:uppercase;font-size:1.05rem;color:var(--navy)}
.ba-soon .ba-soon-s{font-size:.85rem;max-width:40ch}
.ba-soon .ba-soon-strip{position:absolute;top:14px;left:0;right:0;display:flex;justify-content:space-between;padding:0 16px;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:.12em;font-size:.72rem;text-transform:uppercase;color:rgba(0,0,0,.32)}
.back-btn{
  display:inline-flex;align-items:center;gap:6px;
  font-family:'Barlow Condensed',sans-serif;font-weight:700;
  font-size:.88rem;letter-spacing:.07em;text-transform:uppercase;
  color:#000000;cursor:pointer;margin-bottom:24px;
  background:none;border:none;padding:0
}
.back-btn:hover{color:#333333}
.back-btn svg{width:16px;height:16px}

/* ---- CTA BANNER ---- */
.cta-banner{background:var(--navy);padding:64px 0;text-align:center}
.cta-banner h2{color:#fff;margin-bottom:12px}
.cta-banner p{color:rgba(255,255,255,.6);max-width:520px;margin:0 auto 26px}

/* ---- SERVICE ICON CARD ---- */
.svc-card{background:#fff;border-radius:10px;padding:26px 22px;box-shadow:var(--shadow);text-align:center;transition:transform .22s,box-shadow .22s;border-top:4px solid transparent;cursor:pointer}
.svc-card:hover{transform:translateY(-6px);box-shadow:var(--shadow-lg);border-top-color:var(--orange)}
.svc-card .icon{width:52px;height:52px;margin:0 auto 14px;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.08);border-radius:10px;flex-shrink:0}
.svc-card .icon svg{width:28px;height:28px;display:block;flex-shrink:0}
.svc-card h3{font-size:1rem;margin-bottom:6px}
.svc-card p{font-size:.83rem;color:var(--muted);margin:0}

/* ---- ABOUT ---- */
.about-graphic{border-radius:10px;overflow:hidden;position:relative}
.process-step{display:flex;gap:20px;margin-bottom:32px;align-items:flex-start}
.step-num{width:44px;height:44px;border-radius:50%;background:var(--orange);color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:1.1rem;flex-shrink:0}
.step-txt h3{font-size:1.05rem;margin-bottom:5px}
.step-txt p{font-size:.88rem;color:var(--muted);margin:0}

/* ---- FOOTER ---- */
.site-footer{background:var(--navy2);color:rgba(255,255,255,.7);padding:52px 0 24px}
.footer-grid{display:grid;grid-template-columns:2fr 0.7fr 0.7fr 1.4fr;gap:20px;margin-bottom:40px}
.footer-brand p,.site-footer p{font-size:.88rem;color:#ffffff;line-height:1.7;margin-top:14px}
.footer-col h4{font-family:'Barlow Condensed',sans-serif;font-size:.78rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--orange);margin-bottom:14px}
.footer-col ul{list-style:none}
.footer-col ul li{margin-bottom:8px}
.footer-col ul li a{color:rgba(255,255,255,.6);font-size:.88rem;cursor:pointer;transition:color .2s}
.footer-col ul li a:hover{color:var(--orange)}
.footer-bottom{border-top:1px solid rgba(255,255,255,.1);padding-top:18px;display:flex;align-items:center;justify-content:space-between;font-size:.82rem;color:rgba(255,255,255,.3)}

/* ============================================================
   RESPONSIVE
   ============================================================ */
@media(max-width:1024px){
  .g4{grid-template-columns:repeat(3,1fr)}
  .footer-grid{grid-template-columns:1fr 1fr}
  .client-logo-grid{grid-template-columns:repeat(3,1fr)}
  .stats-row{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:768px){
  .section{padding:52px 0}
  .hero-grid{grid-template-columns:1fr;gap:32px}
  .g4{grid-template-columns:repeat(2,1fr)}
  .g3{grid-template-columns:1fr}
  .g2{grid-template-columns:1fr}
  .sub-gallery{grid-template-columns:1fr 1fr}
  .client-logo-grid{grid-template-columns:repeat(2,1fr)}
  .footer-grid{grid-template-columns:1fr;gap:24px}
  .footer-bottom{flex-direction:column;gap:6px;text-align:center}
  .form-row{grid-template-columns:1fr}
  .stats-row{grid-template-columns:repeat(2,1fr)}
  .nav-links{
    display:none;flex-direction:column;position:absolute;
    top:100px;left:0;right:0;background:var(--navy2);
    padding:12px;gap:3px;box-shadow:0 8px 24px rgba(0,0,0,.35)
  }
  .nav-links.open{display:flex}
  .hamburger{display:flex}
  .tagline-row{gap:28px}
}
@media(max-width:480px){
  .g4{grid-template-columns:1fr}
  .sub-gallery{grid-template-columns:1fr}
  .client-logo-grid{grid-template-columns:repeat(2,1fr)}
}

/* ---- PAGE TRANSITION ---- */
#app{animation:fadein .22s ease}
@keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ---- SPLASH PAGE ---- */
.splash-page{
  min-height:100vh;background:#ffffff;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:40px 24px;
}
.splash-logo-wrap{
  width:88%;max-width:990px;
  cursor:pointer;
  transition:transform .25s;
  display:block;
}
.splash-logo-wrap:hover{
  transform:scale(1.125);
}
.splash-logo-wrap svg{width:100%;height:auto;display:block}
.splash-hint{
  margin-top:36px;
  font-family:'Barlow Condensed',sans-serif;
  font-size:.88rem;font-weight:600;letter-spacing:.14em;
  text-transform:uppercase;color:var(--muted);
  display:flex;align-items:center;gap:10px;
  animation:pulse 2.4s ease-in-out infinite;
}
.splash-hint::before,.splash-hint::after{
  content:'';display:block;width:28px;height:1.5px;background:var(--muted);border-radius:2px;
}
@keyframes pulse{0%,100%{opacity:.45}50%{opacity:1}}
</style>
</head>
<body>

<!-- Hidden static form for Netlify form detection — do not remove -->
<form name="contact" netlify netlify-honeypot="bot-field" enctype="multipart/form-data" style="display:none">
  <input type="text" name="first_name">
  <input type="text" name="last_name">
  <input type="text" name="company">
  <input type="tel" name="phone">
  <input type="email" name="email">
  <select name="industry"></select>
  <textarea name="message"></textarea>
  <input type="file" name="attachment">
  <input type="hidden" name="subject">
  <input name="bot-field">
</form>

<section class="section section-dark">
  <div class="container">
    <div class="sec-head">
      <h2>Why Laser Cleaning?</h2>
      <p>The cleanest, safest, most precise surface preparation technology available today.</p>
      <div class="line"></div>
    </div>
    <div class="g3">
      <div class="why-item"><div class="why-icon"><svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#000000" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9" fill="#C8CDD0" fill-opacity="0.35"/><circle cx="12" cy="12" r="5" fill="#5BC8E8" fill-opacity="0.25"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1.5" fill="#5BC8E8" stroke="none"/></svg></div><div><h3>Pinpoint Precision</h3><p>Target only the contaminant layer without damaging the substrate. Perfect for delicate or high-value components.</p></div></div>
      <div class="why-item"><div class="why-icon"><svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#000000" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a7 7 0 00-7 7c0 5 7 13 7 13s7-8 7-13a7 7 0 00-7-7z" fill="#C8CDD0" fill-opacity="0.35"/><path d="M12 2a7 7 0 00-7 7c0 5 7 13 7 13s7-8 7-13a7 7 0 00-7-7z"/><circle cx="12" cy="9" r="2.5" fill="#5BC8E8" stroke="none"/></svg></div><div><h3>Zero Chemicals</h3><p>No solvents, no blasting media, no hazardous waste — fully compliant with environmental regulations.</p></div></div>
      <div class="why-item"><div class="why-icon"><svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#000000" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" fill="#5BC8E8" fill-opacity="0.2"/><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg></div><div><h3>Faster Throughput</h3><p>Dramatically reduce downtime compared to traditional methods. Automated options available for production lines.</p></div></div>

function _wireSlider(ba){
  var after = ba.querySelector('.ba-after'), div = ba.querySelector('.ba-div'), h = ba.querySelector('.ba-handle');
  function set(x){
    var r = ba.getBoundingClientRect();
    var p = Math.max(0, Math.min(1, (x - r.left) / r.width));
    var pct = (p*100).toFixed(2);
    after.style.clipPath = 'inset(0 0 0 ' + pct + '%)';
    div.style.left = pct + '%';
    h.style.left = pct + '%';
  }
  function move(e){ var x = e.touches ? e.touches[0].clientX : e.clientX; set(x); if(e.cancelable) e.preventDefault(); }
  function up(){ window.removeEventListener('mousemove',move); window.removeEventListener('touchmove',move); window.removeEventListener('mouseup',up); window.removeEventListener('touchend',up); }
  function down(e){ window.addEventListener('mousemove',move); window.addEventListener('touchmove',move,{passive:false}); window.addEventListener('mouseup',up); window.addEventListener('touchend',up); move(e); }
  ba.addEventListener('mousedown', down);
  ba.addEventListener('touchstart', down, {passive:false});
}

  if(!pairs.length){ host.innerHTML = _comingSoonHTML(); return; }
  var html = '';
  pairs.forEach(function(p, i){
    var chips = (p.specs || []).map(function(s){
      return '<span class="ba-chip">' + _esc(s[0]) + '&nbsp;&middot;&nbsp;<b>' + _esc(s[1]) + '</b></span>';
    }).join('');
    html += '<div class="ba-card">'
      +   '<div class="ba-head"><span class="ba-tag">Before / After</span><span class="ba-num">' + _pad(i+1) + '</span></div>'
      +   '<div class="ba">'
      +     '<img class="ba-before" src="' + p.before + '" alt="' + _esc(p.title) + ' before laser cleaning">'
      +     '<img class="ba-after" src="' + p.after + '" alt="' + _esc(p.title) + ' after laser cleaning">'
      +     '<span class="ba-lbl b">Before</span><span class="ba-lbl a">After</span>'
      +     '<div class="ba-div"></div>'
      +     '<div class="ba-handle"><svg viewBox="0 0 24 24"><path d="M8 7l-5 5 5 5V7zm8 0v10l5-5-5-5z"/></svg></div>'
      +   '</div>'
      +   '<div class="ba-foot"><h3>' + _esc(p.title) + '</h3>'
      +     (p.desc ? '<p>' + _esc(p.desc) + '</p>' : '')
      +     (chips ? '<div class="ba-specs">' + chips + '</div>' : '')
      +   '</div>'
      + '</div>';
  });
  html += '<p class="ba-hint">Drag the <b>&#9678;</b> handle \u2014 or tap and slide on mobile.</p>';
  host.innerHTML = html;
  host.querySelectorAll('.ba').forEach(_wireSlider);
}

let currentPage = '';

function nav(page, pushState = true) {
  // Close mobile menu
  document.getElementById('navLinks').classList.remove('open');
  document.getElementById('hamburger').classList.remove('open');

  currentPage = page;

  // Hide nav on splash, show on all other pages
  const navEl = document.getElementById('siteNav');
  if (navEl) navEl.style.display = page === 'splash' ? 'none' : '';

  // Push browser history so back/forward work
  if (pushState) {
    const url = page === 'home' ? '/' : `/${page}`;
    history.pushState({ page }, '', url);
  }

  // Scroll to top
  window.scrollTo(0, 0);

  // Update active nav link — subpages highlight their parent
  const pageRoot = page.startsWith('service') ? 'services' :
                   page.startsWith('project') ? 'services' : page;
  document.querySelectorAll('.nav-links a[data-page]').forEach(a => {
    a.classList.toggle('active', a.dataset.page === pageRoot);
  });

  // Render the page
  render(page);
}

function render(page) {
  const app = document.getElementById('app');

  // Service detail pages
  if (serviceData[page]) {
    const data = serviceData[page];
    const tpl = document.getElementById('tpl-service-detail').content.cloneNode(true);
    tpl.getElementById('sd-title-bc').textContent = data.title;
    tpl.getElementById('sd-title').textContent    = data.title;
    tpl.getElementById('sd-subtitle').textContent = data.subtitle;
    tpl.getElementById('sd-h2').textContent       = data.title + ' Laser Cleaning';
    tpl.getElementById('sd-desc').textContent     = data.desc;
    tpl.getElementById('sd-desc2').textContent    = data.desc2;
    renderGallery(tpl, page);
    injectFooter(tpl);
    app.innerHTML = '';
    app.appendChild(tpl);
    fadeIn();
    return;
  }

  // Project detail pages
  if (projectData[page]) {
    const data = projectData[page];
    const tpl = document.getElementById('tpl-project-detail').content.cloneNode(true);
    tpl.getElementById('pd-title-bc').textContent = data.title.split('—')[0].trim();
    tpl.getElementById('pd-title').textContent    = data.title;
    tpl.getElementById('pd-subtitle').textContent = data.subtitle;
    tpl.getElementById('pd-h2').textContent       = data.title;
    tpl.getElementById('pd-desc').textContent     = data.desc;
    tpl.getElementById('pd-desc2').textContent    = data.desc2;
    injectFooter(tpl);
    app.innerHTML = '';
    app.appendChild(tpl);
    fadeIn();
    return;
  }

  // Main pages
  const tplId = {
    splash:   'tpl-splash',
    home:     'tpl-home',
    services: 'tpl-services',
    about:    'tpl-about',
    clients:  'tpl-clients',
    contact:  'tpl-contact',
  }[page] || 'tpl-splash';

  const tpl = document.getElementById(tplId).content.cloneNode(true);
  injectFooter(tpl);
  app.innerHTML = '';
  app.appendChild(tpl);
  fadeIn();
}

// Accumulated files across multiple selections/drops
var allFiles = [];

function updateFileDisplay() {
  var z = document.getElementById('dropZone');
  var fileNames = document.getElementById('fileNames');
  var dropText = document.getElementById('dropText');
  if (!z) return;
  if (allFiles.length) {
    var display = allFiles.map(function(f){ return '📎 ' + f.name; }).join('<br>');
    if (fileNames) fileNames.innerHTML = display;
    if (dropText) dropText.textContent = allFiles.length + ' file' + (allFiles.length > 1 ? 's' : '') + ' selected — drag more to add';
    z.style.borderColor = 'var(--orange)';
    z.style.background = 'rgba(91,200,232,.04)';
    z.dataset.selected = '1';
    // Sync to file input
    try {
      var dt = new DataTransfer();
      allFiles.forEach(function(f){ dt.items.add(f); });
      var fi = document.getElementById('fileInput');
      if (fi) fi.files = dt.files;
    } catch(e){}
  } else {
    if (fileNames) fileNames.innerHTML = '';
    if (dropText) dropText.textContent = 'ontouchstart' in window ? 'TAP TO ATTACH PHOTOS OR FILES' : 'DRAG & DROP FILES HERE';
    z.style.borderColor = 'var(--gray)';
    z.style.background = 'var(--offwhite)';
    z.dataset.selected = '';
  }
}

function handleFileSelect(files) {
  // Add new files to accumulated list, avoid duplicates by name+size
  Array.from(files).forEach(function(f) {
    var exists = allFiles.some(function(e){ return e.name === f.name && e.size === f.size; });
    if (!exists) allFiles.push(f);
  });
  updateFileDisplay();
}

function showFileNames(input) {
  handleFileSelect(input.files);
}

// Phone auto-format to (XXX) XXX-XXXX
function formatPhone(input) {
  var digits = input.value.replace(/\D/g, '').slice(0, 10);
  var formatted = '';
  if (digits.length > 0) formatted = '(' + digits.slice(0, 3);
  if (digits.length >= 4) formatted += ') ' + digits.slice(3, 6);
  if (digits.length >= 7) formatted += '-' + digits.slice(6, 10);
  input.value = formatted;
}

// Form validation
function validateForm(form) {
  var errors = [];
  var fields = {
    'first_name': 'First name',
    'last_name':  'Last name',
    'company':    'Company name',
    'phone':      'Phone number',
    'email':      'Email address',
    'message':    'Project description'
  };

  // Clear previous errors
  form.querySelectorAll('.field-error').forEach(function(e){ e.remove(); });
  form.querySelectorAll('.input-error').forEach(function(e){ e.classList.remove('input-error'); });

  var firstError = null;

  Object.keys(fields).forEach(function(name) {
    var el = form.querySelector('[name="' + name + '"]');
    if (!el) return;
    var val = el.value.trim();
    var err = null;

    if (!val) {
      err = fields[name] + ' is required';
    } else if (name === 'email') {
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val)) err = 'Please enter a valid email address';
    } else if (name === 'phone') {
      var digits = val.replace(/\D/g, '');
      if (digits.length < 10) err = 'Please enter a valid 10-digit US phone number';
    }

    if (err) {
      el.classList.add('input-error');
      var msg = document.createElement('div');
      msg.className = 'field-error';
      msg.style.cssText = 'color:#c0392b;font-size:.78rem;margin-top:4px;font-weight:600';
      msg.textContent = '⚠ ' + err;
      el.parentNode.appendChild(msg);
      errors.push(err);
      if (!firstError) firstError = el;
    }
  });

  if (firstError) firstError.focus();
  return errors.length === 0;
}

// Set up drag and drop on the drop zone after it renders
document.addEventListener('DOMContentLoaded', function() {
  // Detect touch device
  if ('ontouchstart' in window) {
    var dt = document.getElementById('dropText');
    if (dt) dt.textContent = 'TAP TO ATTACH PHOTOS OR FILES';
  }

  // Phone formatting — attach to phone input
  function initPhoneFormat() {
    var phone = document.querySelector('[name="phone"]');
    if (phone && !phone._phoneBound) {
      phone._phoneBound = true;
      phone.addEventListener('input', function(){ formatPhone(this); });
      phone.setAttribute('placeholder', '(916) 555-1234');
      phone.setAttribute('maxlength', '14');
    }
  }

  // Drag and drop setup
  function initDropZone() {
    var zone = document.getElementById('dropZone');
    if (!zone || zone._dropBound) return;
    zone._dropBound = true;
    zone.addEventListener('dragover', function(e) {
      e.preventDefault();
      zone.style.borderColor = 'var(--orange)';
      zone.style.background = 'rgba(91,200,232,.06)';
      zone.style.transform = 'scale(1.01)';
    });
    zone.addEventListener('dragleave', function() {
      zone.style.borderColor = zone.dataset.selected ? 'var(--orange)' : 'var(--gray)';
      zone.style.background = zone.dataset.selected ? 'rgba(91,200,232,.04)' : 'var(--offwhite)';
      zone.style.transform = 'scale(1)';
    });
    zone.addEventListener('drop', function(e) {
      e.preventDefault();
      zone.style.transform = 'scale(1)';
      if (e.dataTransfer.files.length) handleFileSelect(e.dataTransfer.files);
    });
    initPhoneFormat();
  }

  initDropZone();
  initPhoneFormat();

  var origNav = window.nav;
  if (origNav) {
    window.nav = function(page, push) {
      origNav(page, push);
      allFiles = []; // reset files on page change
      setTimeout(function(){ initDropZone(); initPhoneFormat(); }, 400);
    };
  }
});

// Netlify Forms submission handler
document.addEventListener('DOMContentLoaded', function() {
  function initForm() {
    var form = document.getElementById('contactForm');
    if (!form || form._netlifyBound) return;
    form._netlifyBound = true;

    form.addEventListener('submit', function(e) {
      e.preventDefault();
      e.stopPropagation();

      // Validate first
      if (!validateForm(form)) return;

      var btn = form.querySelector('button[type=submit]');
      btn.textContent = 'Sending...';
      btn.disabled = true;

      var data = new FormData(form);

      fetch('/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams(new FormData(form)).toString()
      })
      .then(function(response) {
        if (response.ok || response.redirected) {
          // Show success message
          var success = document.getElementById('form-success');
          if (success) {
            success.style.display = 'block';
            success.scrollIntoView({ behavior: 'smooth', block: 'center' });
          }
          form.reset();
          var fileNames = document.getElementById('fileNames');
          var dropZone = document.getElementById('dropZone');
          var dropText = document.getElementById('dropText');
          if (fileNames) fileNames.innerHTML = '';
          if (dropZone) { dropZone.style.borderColor = 'var(--gray)'; dropZone.style.background = 'var(--offwhite)'; dropZone.dataset.selected = ''; }
          if (dropText) dropText.textContent = 'DRAG & DROP FILES HERE';
          btn.textContent = '✓ Sent';
        } else {
          throw new Error('Submission failed');
        }
      })
      .catch(function(err) {
        console.error(err);
        btn.textContent = 'Send Message';
        btn.disabled = false;
        alert('Something went wrong. Please email us directly at info@precisionlasersolutions.us or call (916) 919-2850');
      });
    });
  }

  initForm();
  // Re-init after SPA navigation to contact page
  var _origNav = window.nav;
  if (_origNav) {
    window.nav = function(page, push) {
      _origNav(page, push);
      setTimeout(initForm, 400);
    };
  }
});

window.addEventListener('popstate', function(e) {
  const page = e.state && e.state.page ? e.state.page : 'home';
  // Never pop back to splash via browser navigation — go to home instead
  nav(page === 'splash' ? 'home' : page, false);
});

// ============================================================
//  BOOT — detect initial URL
// ============================================================
(function boot() {
  // Splash shows ONLY on the very first page load per browser session.
  // Back/forward and all nav clicks never return to splash.
  const alreadySeen = sessionStorage.getItem('pls_seen');
  const path = window.location.pathname.replace(/^\//, '') || '';
  let startPage;
  if (!alreadySeen && (path === '' || path === 'index.html' || path === 'splash')) {
    startPage = 'splash';
    sessionStorage.setItem('pls_seen', '1');
  } else {
    startPage = (path === '' || path === 'index.html' || path === 'splash') ? 'home' : path;
  }
  history.replaceState({ page: startPage }, '', window.location.href);
  nav(startPage, false);
})();
</script>
